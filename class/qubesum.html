<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세제곱의 합 3D 시각화 증명 (실시간 Sn 가이드)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; justify-content: flex-end; padding: 1.5rem; }
        .ui-panel {
            pointer-events: auto;
            background: rgba(30, 30, 35, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 360px;
            height: fit-content;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .dim-label {
            position: absolute;
            background: rgba(15, 23, 42, 0.5);
            color: rgba(96, 165, 250, 0.95);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid rgba(96, 165, 250, 0.3);
            transform: translate(-50%, -50%) scale(1);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="labels-container" class="pointer-events-none absolute inset-0 z-20 overflow-hidden">
        <div id="label-w" class="dim-label opacity-0"></div>
        <div id="label-d" class="dim-label opacity-0"></div>
        
        <!-- 3D 공간 상에 띄울 공식 가이드 라벨 (기본 축소 상태) -->
        <div id="label-formula" class="dim-label opacity-0 text-base md:text-lg border-blue-400 text-blue-300 flex items-center gap-1.5 p-3 bg-slate-900/80 border" style="transform: translate(-50%, -50%) scale(0.95);">
            <span>&sum; k&sup3; = </span>
            <span class="text-xl">[</span>
            <span class="flex flex-col items-center justify-center text-xs font-bold leading-none">
                <span class="border-b border-blue-400/60 pb-0.5 px-1">n(n + 1)</span>
                <span class="pt-0.5">2</span>
            </span>
            <span class="text-xl">]</span>
            <span class="text-xs align-super -mt-3">&sup2;</span>
        </div>
    </div>

    <div id="ui-layer">
        <div class="ui-panel">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-bold text-white">∑k³ 시각적 증명</h1>
                <button id="btn-toggle-ui" class="text-gray-400 hover:text-white focus:outline-none" title="UI 최소화/최대화">
                    <!-- 축소 중인 상태(기본): 아래 방향 화살표(▼) 노출 -->
                    <svg id="icon-expand" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    <!-- 확장 중인 상태: 위 방향 화살표(▲) 노출 -->
                    <svg id="icon-collapse" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                </button>
            </div>
            
            <div id="ui-collapsible-top" class="hidden">
                <p class="text-xs text-gray-400 mb-4">정육면체(k³)가 L자 테두리로 펼쳐지며 조립됩니다.</p>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-semibold">최대 숫자 (n)</label>
                    </div>
                    <div class="flex items-center justify-between bg-black/40 rounded-lg p-1.5 border border-white/10">
                        <button id="btn-n-dec" class="px-4 py-1 bg-gray-700 hover:bg-gray-600 rounded text-white font-bold transition-colors">-</button>
                        <span id="n-display" class="font-bold text-lg text-blue-400">5</span>
                        <button id="btn-n-inc" class="px-4 py-1 bg-gray-700 hover:bg-gray-600 rounded text-white font-bold transition-colors">+</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 my-2">
                <button id="btn-step-assemble" class="bg-blue-600 hover:bg-blue-500 transition-colors py-2 rounded text-sm font-bold shadow-lg">
                    1³ 조립하기
                </button>
                <button id="btn-step-disassemble" class="bg-gray-700 hover:bg-gray-600 transition-colors py-2 rounded text-sm font-bold shadow-lg" disabled>
                    분해 완료
                </button>
            </div>

            <div id="ui-collapsible-bottom" class="hidden">
                <div class="grid grid-cols-2 gap-2 mb-4 mt-4">
                    <button id="btn-all-assemble" class="bg-blue-800 hover:bg-blue-700 transition-colors py-2 rounded text-sm font-bold shadow-lg border border-blue-500/30">
                        모두 조립
                    </button>
                    <button id="btn-all-disassemble" class="bg-gray-800 hover:bg-gray-700 transition-colors py-2 rounded text-sm font-bold shadow-lg border border-gray-500/30">
                        모두 분해
                    </button>
                </div>

                <div class="bg-black/30 rounded-lg p-3 text-sm space-y-2 border border-white/5">
                    <div class="flex justify-between items-center text-xs text-gray-400">
                        <span>현재 조립된 부피 (k³):</span>
                        <span id="val-gnomon" class="font-mono text-white">0</span>
                    </div>
                    <div class="border-t border-gray-600/50 my-1"></div>
                    <div class="flex justify-between items-center text-xs text-gray-400">
                        <span>전체 블록 수 (Σk³):</span>
                        <span id="val-total" class="font-mono font-bold text-white">225</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-400">
                        <span>최종 정사각형 한 변 (Sn):</span>
                        <span id="val-side" class="font-mono font-bold text-blue-400">15</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-400">
                        <span>최종 정사각형 넓이 (Sn²):</span>
                        <span id="val-area" class="font-mono font-bold text-blue-400">225</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, masterGroup;
        let groups = [];
        
        let guideBoxMesh, guideEdgesHelper;
        const cx_offset = new THREE.Vector3();
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false; 
        
        let showFormulaLabel = false;
        let formulaTimeout = null;

        const blockGeo = new THREE.BoxGeometry(0.95, 0.95, 0.95);
        const colors = [0xff595e, 0xffca3a, 0x8ac926, 0x1982c4, 0x6a4c93, 0xeb5e28];
        const materials = colors.map(c => new THREE.MeshPhysicalMaterial({ 
            color: c, metalness: 0.1, roughness: 0.3, clearcoat: 0.4
        }));

        let currentN = 5;
        let currentStep = 0; 
        let autoAnimInterval = null;

        window.onload = function() {
            init3D();
            setupUI();
            createModel(currentN);
            animate();
        };

        function init3D() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x121212, 0.012);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 35, 45); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.target.set(0, 0, -5); 

            controls.addEventListener('start', () => { isDragging = false; });
            controls.addEventListener('change', () => { isDragging = true; });

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const planeGeo = new THREE.PlaneGeometry(200, 200);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.25 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.5; 
            plane.receiveShadow = true;
            scene.add(plane);

            const gridHelper = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
            gridHelper.position.y = -0.49;
            scene.add(gridHelper);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            window.addEventListener('resize', onWindowResize, false);
            
            window.addEventListener('click', onDocumentClick, false);
            window.addEventListener('touchstart', onDocumentTouchStart, { passive: true });
        }

        function buildCubeToGnomonMapping(k, Sk_prev) {
            let topPairs = []; let rightPairs = [];
            for (let cy = 1; cy < k; cy++) {
                for (let cz = 0; cz < k; cz++) {
                    if (cz < k - cy) topPairs.push({cy, cz});
                    else rightPairs.push({cy, cz});
                }
            }
            let mappings = [];
            for (let cx = 0; cx < k; cx++) {
                for (let cz = 0; cz < k; cz++) {
                    mappings.push({ cx, cy: 0, cz, tx: Sk_prev + cx, tz: Sk_prev + cz });
                }
            }
            for (let i = 0; i < topPairs.length; i++) {
                let p = topPairs[i];
                for (let cx = 0; cx < k; cx++) {
                    mappings.push({ cx, cy: p.cy, cz: p.cz, tx: i, tz: Sk_prev + cx });
                }
            }
            for (let i = 0; i < rightPairs.length; i++) {
                let p = rightPairs[i];
                for (let cx = 0; cx < k; cx++) {
                    mappings.push({ cx, cy: p.cy, cz: p.cz, tx: Sk_prev + cx, tz: i });
                }
            }
            return mappings;
        }

        function createModel(n) {
            groups.forEach(g => masterGroup.remove(g));
            groups = [];
            currentStep = 0;
            clearAutoAnim();
            updateControlsUI();
            
            if (guideBoxMesh) scene.remove(guideBoxMesh);
            if (guideEdgesHelper) scene.remove(guideEdgesHelper);

            // 모델 변경 시 활성화된 수식 UI 상태 리셋
            showFormulaLabel = false;
            if (formulaTimeout) clearTimeout(formulaTimeout);
            const formulaEl = document.getElementById('label-formula');
            if (formulaEl) {
                formulaEl.style.opacity = '0';
                formulaEl.style.transform = 'translate(-50%, -50%) scale(0.95)';
            }

            const labelsContainer = document.getElementById('labels-container');
            const oldCubeLabels = document.querySelectorAll('.cube-label');
            oldCubeLabels.forEach(el => el.remove());

            const Sn = (n * (n + 1)) / 2;
            let totalBlocks = 0;

            cx_offset.set((Sn - 1) / 2, 0, (Sn - 1) / 2);

            for (let k = 1; k <= n; k++) {
                const group = new THREE.Group();
                const material = materials[k - 1];
                const Sk_prev = (k - 1) * k / 2;
                
                const mappings = buildCubeToGnomonMapping(k, Sk_prev);
                
                const spacing = Math.max(8, n * 2);
                const cubeStartX = (k - (n + 1) / 2) * spacing;
                const cubeStartZ = -Sn/2 - 12;
                const cubeCenterWorld = new THREE.Vector3(cubeStartX, k/2, cubeStartZ);

                const L_TargetCenter = new THREE.Vector3( 
                    ((Sk_prev + k/2) - 0.5) - cx_offset.x, 
                    0, 
                    ((Sk_prev + k/2) - 0.5) - cx_offset.z 
                );

                group.userData = { 
                    animProgress: 0, 
                    animTarget: 0, 
                    localIndex: k,
                    cubeCenterWorld: cubeCenterWorld.clone() 
                };

                mappings.forEach(map => {
                    const mesh = new THREE.Mesh(blockGeo, material);
                    
                    const localCube = new THREE.Vector3(map.cx - (k - 1) / 2, map.cy - (k - 1) / 2, map.cz - (k - 1) / 2);
                    const worldCube = cubeCenterWorld.clone().add(localCube);
                    const worldTarget = new THREE.Vector3(map.tx - cx_offset.x, 0, map.tz - cx_offset.z);
                    const offsetToL = worldTarget.clone().sub(L_TargetCenter);
                    const worldL = cubeCenterWorld.clone().add(offsetToL);

                    mesh.position.copy(worldCube); 
                    mesh.castShadow = true; mesh.receiveShadow = true;
                    
                    mesh.userData = { worldCube, worldL, worldTarget, cy: map.cy };
                    group.add(mesh);
                    totalBlocks++;
                });

                masterGroup.add(group);
                groups.push(group);

                const cubeLabel = document.createElement('div');
                cubeLabel.id = `cube-label-${k}`;
                cubeLabel.className = 'dim-label cube-label opacity-0';
                cubeLabel.style.background = 'rgba(30, 41, 59, 0.7)';
                cubeLabel.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                cubeLabel.style.color = '#fff';
                cubeLabel.textContent = `${k}³`;
                labelsContainer.appendChild(cubeLabel);
            }

            const dummyGeo = new THREE.BoxGeometry(1, 0.95, 1);
            guideBoxMesh = new THREE.Mesh(dummyGeo, new THREE.MeshBasicMaterial({ color: 0x4299e1, transparent: true, opacity: 0, depthWrite: false }));
            guideEdgesHelper = new THREE.LineSegments(new THREE.EdgesGeometry(dummyGeo), new THREE.LineBasicMaterial({ color: 0x90cdf4, transparent: true, opacity: 0, linewidth: 2 }));
            scene.add(guideBoxMesh);
            scene.add(guideEdgesHelper);

            updateUIInfo(n, totalBlocks);
        }

        function getFormulaString(k) {
            if (k === 1) return "S₁ = 1";
            if (k === 2) return "S₂ = 1 + 2";
            let str = "S" + getSubscript(k) + " = 1 + 2 + ⋯";
            return str + " + " + k;
        }
        
        function getSubscript(num) {
            const subs = ["₀","₁","₂","₃","₄","₅","₆"];
            return subs[num] || num;
        }

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function animate() {
            requestAnimationFrame(animate);
            const stepSize = 0.025;

            groups.forEach((group, idx) => {
                let { animProgress, animTarget, localIndex, cubeCenterWorld } = group.userData;
                if (animProgress !== animTarget) {
                    if (animProgress < animTarget) animProgress = Math.min(animProgress + stepSize, animTarget);
                    else animProgress = Math.max(animProgress - stepSize, animTarget);
                    group.userData.animProgress = animProgress;

                    group.children.forEach(mesh => {
                        const { worldCube, worldL, worldTarget, cy } = mesh.userData;
                        if (animProgress <= 1.0) {
                            const t = easeInOutCubic(animProgress);
                            mesh.position.lerpVectors(worldCube, worldL, t);
                            mesh.position.y += Math.sin(t * Math.PI) * 0.5 * (cy + 1);
                        } else {
                            const t = easeInOutCubic(animProgress - 1.0);
                            mesh.position.lerpVectors(worldL, worldTarget, t);
                            const distance = worldL.distanceTo(worldTarget);
                            mesh.position.y += Math.sin(t * Math.PI) * (distance * 0.15 + localIndex * 0.5);
                        }
                    });
                }

                const k = idx + 1;
                const el = document.getElementById(`cube-label-${k}`);
                if (el) {
                    if (animProgress < 0.25) {
                        el.style.opacity = (1 - (animProgress / 0.25)) * 0.85;
                        const labelWorldPos = cubeCenterWorld.clone().add(new THREE.Vector3(0, k/2 + 0.8, 0));
                        updateLabelPos(`cube-label-${k}`, labelWorldPos);
                    } else {
                        el.style.opacity = '0';
                    }
                }
            });

            let activeK = 0;
            for (let i = 0; i < currentN; i++) {
                if (groups[i].userData.animProgress > 1.0) {
                    activeK = i + 1; 
                }
            }

            if (activeK > 0) {
                const Sk = (activeK * (activeK + 1)) / 2;
                
                guideBoxMesh.scale.set(Sk, 1, Sk);
                guideEdgesHelper.scale.set(Sk, 1, Sk);
                
                const guideX = (Sk - 1) / 2 - cx_offset.x;
                const guideZ = (Sk - 1) / 2 - cx_offset.z;
                guideBoxMesh.position.set(guideX, 0, guideZ);
                guideEdgesHelper.position.set(guideX, 0, guideZ);

                guideBoxMesh.material.opacity += (0.08 - guideBoxMesh.material.opacity) * 0.1;
                guideEdgesHelper.material.opacity += (0.55 - guideEdgesHelper.material.opacity) * 0.1;

                document.getElementById('label-w').style.opacity = '0.8';
                document.getElementById('label-d').style.opacity = '0.8';
                
                const labelFormula = getFormulaString(activeK);
                document.getElementById('label-w').textContent = labelFormula;
                document.getElementById('label-d').textContent = labelFormula;

                updateLabelPos('label-w', new THREE.Vector3(guideX, 0, guideZ - Sk/2));
                updateLabelPos('label-d', new THREE.Vector3(guideX - Sk/2, 0, guideZ));

                // [수정]: 중간 조립 단계에서도 공식 라벨이 현재 활성화된 가이드 영역의 동적 중심 상단에 뜨도록 수정
                if (showFormulaLabel) {
                    updateLabelPos('label-formula', new THREE.Vector3(guideX, 1.4, guideZ));
                }
            } else {
                guideBoxMesh.material.opacity += (0 - guideBoxMesh.material.opacity) * 0.1;
                guideEdgesHelper.material.opacity += (0 - guideEdgesHelper.material.opacity) * 0.1;
                document.getElementById('label-w').style.opacity = '0';
                document.getElementById('label-d').style.opacity = '0';

                if (showFormulaLabel) {
                    updateLabelPos('label-formula', new THREE.Vector3(0, 1.4, 0));
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function updateLabelPos(id, worldPos) {
            const vec = worldPos.clone().project(camera);
            const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
            const y = (vec.y * -0.5 + 0.5) * window.innerHeight;
            const el = document.getElementById(id);
            if (el) {
                el.style.left = `${x}px`; el.style.top = `${y}px`;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function clearAutoAnim() {
            if (autoAnimInterval) { clearInterval(autoAnimInterval); autoAnimInterval = null; }
        }

        function triggerFormulaLabel() {
            showFormulaLabel = true;
            const formulaEl = document.getElementById('label-formula');
            if (formulaEl) {
                formulaEl.style.opacity = '0.9';
                formulaEl.style.transform = 'translate(-50%, -50%) scale(1.05)';
            }
            
            if (formulaTimeout) clearTimeout(formulaTimeout);
            formulaTimeout = setTimeout(() => {
                showFormulaLabel = false;
                if (formulaEl) {
                    formulaEl.style.opacity = '0';
                    formulaEl.style.transform = 'translate(-50%, -50%) scale(0.95)';
                }
            }, 5000); // 5초 유지
        }

        function checkIntersectAndTrigger(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            if (guideBoxMesh) {
                const intersects = raycaster.intersectObject(guideBoxMesh);
                // [수정]: 조립이 하나 이상 완료된 상태(currentStep > 0)라면 중간 과정에서도 클릭 가능하도록 수정
                if (intersects.length > 0 && currentStep > 0) {
                    triggerFormulaLabel();
                }
            }
        }

        function onDocumentClick(e) {
            if (isDragging) return; 
            if (e.target.closest('.ui-panel')) return;
            checkIntersectAndTrigger(e.clientX, e.clientY);
        }

        function onDocumentTouchStart(e) {
            if (e.target.closest('.ui-panel')) return;
            isDragging = false; 
            if (e.touches.length > 0) {
                setTimeout(() => {
                    if (!isDragging) {
                        checkIntersectAndTrigger(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }, 80);
            }
        }

        function updateControlsUI() {
            const btnAssemble = document.getElementById('btn-step-assemble');
            const btnDisassemble = document.getElementById('btn-step-disassemble');

            if (currentStep < currentN) {
                btnAssemble.textContent = `${currentStep + 1}³ 조립하기`;
                btnAssemble.disabled = false;
            } else {
                btnAssemble.textContent = `조립 완료`;
                btnAssemble.disabled = true;
            }

            if (currentStep > 0) {
                btnDisassemble.textContent = `${currentStep}³ 분해하기`;
                btnDisassemble.disabled = false;
                document.getElementById('val-gnomon').textContent = Math.pow(currentStep, 3);
            } else {
                btnDisassemble.textContent = `분해 완료`;
                btnDisassemble.disabled = true;
                document.getElementById('val-gnomon').textContent = "0";
            }
        }

        function setupUI() {
            const btnNInc = document.getElementById('btn-n-inc');
            const btnNDec = document.getElementById('btn-n-dec');
            const nDisplay = document.getElementById('n-display');
            
            const btnAssemble = document.getElementById('btn-step-assemble');
            const btnDisassemble = document.getElementById('btn-step-disassemble');
            const btnAllAssemble = document.getElementById('btn-all-assemble');
            const btnAllDisassemble = document.getElementById('btn-all-disassemble');

            const btnToggleUI = document.getElementById('btn-toggle-ui');
            const uiTop = document.getElementById('ui-collapsible-top');
            const uiBottom = document.getElementById('ui-collapsible-bottom');
            const iconCollapse = document.getElementById('icon-collapse');
            const iconExpand = document.getElementById('icon-expand');

            let isUIMinimized = true;

            btnToggleUI.addEventListener('click', () => {
                isUIMinimized = !isUIMinimized;
                if (isUIMinimized) {
                    uiTop.classList.add('hidden'); uiBottom.classList.add('hidden');
                    iconCollapse.classList.add('hidden'); iconExpand.classList.remove('hidden');
                } else {
                    uiTop.classList.remove('hidden'); uiBottom.classList.remove('hidden');
                    iconCollapse.classList.remove('hidden'); iconExpand.classList.add('hidden');
                }
            });

            btnNInc.addEventListener('click', () => {
                if (currentN < 6) { currentN++; nDisplay.textContent = currentN; createModel(currentN); }
            });

            btnNDec.addEventListener('click', () => {
                if (currentN > 1) { currentN--; nDisplay.textContent = currentN; createModel(currentN); }
            });

            btnAssemble.addEventListener('click', () => {
                clearAutoAnim();
                if (currentStep < currentN) { groups[currentStep].userData.animTarget = 2; currentStep++; updateControlsUI(); }
            });

            btnDisassemble.addEventListener('click', () => {
                clearAutoAnim();
                if (currentStep > 0) { currentStep--; groups[currentStep].userData.animTarget = 0; updateControlsUI(); }
            });

            btnAllAssemble.addEventListener('click', () => {
                clearAutoAnim();
                autoAnimInterval = setInterval(() => {
                    if (currentStep < currentN) { groups[currentStep].userData.animTarget = 2; currentStep++; updateControlsUI(); }
                    else { clearAutoAnim(); }
                }, 800);
            });

            btnAllDisassemble.addEventListener('click', () => {
                clearAutoAnim();
                autoAnimInterval = setInterval(() => {
                    if (currentStep > 0) { currentStep--; groups[currentStep].userData.animTarget = 0; updateControlsUI(); }
                    else { clearAutoAnim(); }
                }, 800);
            });
        }

        function updateUIInfo(n, totalBlocks) {
            const Sn = (n * (n + 1)) / 2;
            document.getElementById('val-total').textContent = totalBlocks;
            document.getElementById('val-side').textContent = `1 + 2 + ⋯ + ${n} (= ${Sn})`;
            document.getElementById('val-area').textContent = Sn * Sn;
        }
    </script>
</body>
</html>
