<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세제곱의 합 3D 시각화 증명 (실시간 Sn 가이드)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* 밝은 테마 배경 적용 */
        body { margin: 0; overflow: hidden; background-color: #f0f2f5; color: #1f2937; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; justify-content: flex-end; padding: 1.5rem; }
        
        /* 패널 밝은 테마 */
        .ui-panel {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 360px;
            height: fit-content;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .ui-panel.is-minimized {
            width: max-content;
            padding: 0.75rem 1rem;
            border-radius: 3rem;
        }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 3D 라벨 밝은 테마 */
        .dim-label {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            color: #1d4ed8; /* blue-700 */
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid rgba(59, 130, 246, 0.4);
            transform: translate(-50%, -50%) scale(1);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            backdrop-filter: blur(2px);
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* 수식 가독성 강화를 위한 커스텀 수학 폰트 스택 */
        .math-font {
            font-family: 'Cambria Math', 'Latin Modern Math', 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="labels-container" class="pointer-events-none absolute inset-0 z-20 overflow-hidden">
        <div id="label-w" class="dim-label opacity-0"></div>
        <div id="label-d" class="dim-label opacity-0"></div>
        
        <!-- 3D 공간 상에 띄울 공식 가이드 라벨 (수식 구조화 및 가독성 최적화) -->
        <div id="label-formula" class="dim-label opacity-0 border-blue-300 text-blue-800 flex items-center p-6 bg-white/95 border-2 rounded-2xl shadow-[0_0_30px_rgba(59,130,246,0.25)] transition-all duration-300 math-font" style="transform: translate(-50%, -50%) scale(0.95);">
            <!-- 좌항: 시그마(1부터 n까지) k^3 -->
            <div class="flex items-center mr-4">
                <div class="flex flex-col items-center justify-center mr-1">
                    <span class="text-sm font-bold text-blue-600 leading-none mb-0.5">n</span>
                    <span class="text-5xl leading-none">&sum;</span>
                    <span class="text-xs font-bold text-blue-600 leading-none mt-1">k=1</span>
                </div>
                <span class="text-4xl font-semibold mt-1">k<sup class="text-xl text-blue-700 font-bold ml-0.5">3</sup></span>
            </div>
            
            <span class="text-4xl mx-2 font-bold text-gray-600">=</span>
            
            <!-- 우항: [n(n+1)/2]^2 -->
            <div class="flex items-center">
                <span class="text-6xl font-light text-gray-700">[</span>
                <span class="flex flex-col items-center justify-center font-bold leading-tight mt-1 mx-2">
                    <span class="text-3xl border-b-[3px] border-blue-500/60 pb-1 px-4 tracking-wide">n(n + 1)</span>
                    <span class="text-3xl pt-1">2</span>
                </span>
                <span class="text-6xl font-light text-gray-700">]</span>
                <sup class="text-3xl font-bold text-blue-700 -mt-8 ml-1">2</sup>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="ui-panel is-minimized">
            <!-- Header (헤더 영역) -->
            <div class="flex justify-between items-center">
                <h1 id="ui-title" class="text-xl font-bold text-gray-800 hidden shrink-0 mr-4">∑k³ 시각화</h1>
                
                <!-- 최소화 시 나타나는 미니 버튼 그룹 -->
                <div id="mini-actions" class="flex gap-1.5 mr-2 justify-end">
                    <button id="btn-mini-assemble" class="bg-blue-600 hover:bg-blue-700 text-white transition-colors px-3 py-1.5 rounded-full text-xs font-bold shadow-sm whitespace-nowrap min-w-[85px] text-center">
                        전체 조립
                    </button>
                    <button id="btn-mini-disassemble" class="bg-gray-200 hover:bg-gray-300 text-gray-700 transition-colors px-3 py-1.5 rounded-full text-xs font-bold shadow-sm whitespace-nowrap min-w-[85px] text-center">
                        전체 분해
                    </button>
                </div>

                <button id="btn-toggle-ui" class="text-gray-500 hover:text-gray-800 focus:outline-none flex-shrink-0 bg-gray-100 hover:bg-gray-200 rounded-full p-1 ml-auto transition-colors" title="UI 최소화/최대화">
                    <!-- 축소할 때(펼쳐져 있을 때) 누르는 버튼 -->
                    <svg id="icon-collapse" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                    <!-- 펼칠 때(축소되어 있을 때) 누르는 버튼 -->
                    <svg id="icon-expand" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>
            
            <!-- Body (확장 영역) -->
            <div id="ui-body" class="hidden mt-4">
                <p class="text-xs text-gray-500 mb-4">정육면체(k³)가 L자 테두리로 펼쳐지며 조립됩니다.</p>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-semibold text-gray-700">최대 숫자 (n)</label>
                    </div>
                    <div class="flex items-center justify-between bg-gray-50 rounded-lg p-1.5 border border-gray-200">
                        <button id="btn-n-dec" class="px-4 py-1 bg-white hover:bg-gray-100 border border-gray-300 rounded text-gray-700 font-bold transition-colors shadow-sm">-</button>
                        <span id="n-display" class="font-bold text-lg text-blue-600">5</span>
                        <button id="btn-n-inc" class="px-4 py-1 bg-white hover:bg-gray-100 border border-gray-300 rounded text-gray-700 font-bold transition-colors shadow-sm">+</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 my-2">
                    <button id="btn-step-assemble" class="bg-blue-500 hover:bg-blue-600 text-white transition-colors py-2 rounded text-sm font-bold shadow-sm">
                        1³ 조립하기
                    </button>
                    <button id="btn-step-disassemble" class="bg-gray-200 hover:bg-gray-300 text-gray-700 transition-colors py-2 rounded text-sm font-bold shadow-sm" disabled>
                        분해 완료
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-4 mt-4">
                    <button id="btn-all-assemble" class="bg-blue-700 hover:bg-blue-800 text-white transition-colors py-2 rounded text-sm font-bold shadow-sm">
                        모두 조립
                    </button>
                    <button id="btn-all-disassemble" class="bg-gray-300 hover:bg-gray-400 text-gray-800 transition-colors py-2 rounded text-sm font-bold shadow-sm">
                        모두 분해
                    </button>
                </div>

                <div class="bg-gray-50 rounded-lg p-3 text-sm space-y-2 border border-gray-200 shadow-inner">
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>현재 조립된 부피 (k³):</span>
                        <span id="val-gnomon" class="font-mono text-gray-800">0</span>
                    </div>
                    <div class="border-t border-gray-200 my-1"></div>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>전체 블록 수 (Σk³):</span>
                        <span id="val-total" class="font-mono font-bold text-gray-900">225</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>최종 정사각형 한 변 (Sn):</span>
                        <span id="val-side" class="font-mono font-bold text-blue-600">15</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>최종 정사각형 넓이 (Sn²):</span>
                        <span id="val-area" class="font-mono font-bold text-blue-600">225</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, masterGroup;
        let groups = [];
        
        let guideBoxMesh, guideEdgesHelper;
        const cx_offset = new THREE.Vector3();
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false; 
        
        let showFormulaLabel = false;
        let formulaTimeout = null;

        const blockGeo = new THREE.BoxGeometry(0.95, 0.95, 0.95);
        const colors = [0xff595e, 0xffca3a, 0x8ac926, 0x1982c4, 0x6a4c93, 0xeb5e28];
        const materials = colors.map(c => new THREE.MeshPhysicalMaterial({ 
            color: c, metalness: 0.1, roughness: 0.3, clearcoat: 0.4
        }));

        let currentN = 5;
        let currentStep = 0; 
        let autoAnimTimer = null;

        window.onload = function() {
            init3D();
            setupUI();
            createModel(currentN);
            animate();
        };

        function init3D() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            // 배경과 어우러지는 밝은 안개
            scene.fog = new THREE.FogExp2(0xf0f2f5, 0.012);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 35, 45); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.target.set(0, 0, -5); 

            controls.addEventListener('start', () => { isDragging = false; });
            controls.addEventListener('change', () => { isDragging = true; });

            // 밝은 테마에 맞춘 광원
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(10, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const planeGeo = new THREE.PlaneGeometry(200, 200);
            // 흰색 배경에서 그림자가 자연스럽게 보이도록 투명도 조절
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.12 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.5; 
            plane.receiveShadow = true;
            scene.add(plane);

            // 밝은 그리드 헬퍼
            const gridHelper = new THREE.GridHelper(100, 100, 0xcccccc, 0xe5e5e5);
            gridHelper.position.y = -0.49;
            scene.add(gridHelper);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            window.addEventListener('resize', onWindowResize, false);
            
            window.addEventListener('click', onDocumentClick, false);
            window.addEventListener('touchstart', onDocumentTouchStart, { passive: true });
        }

        function buildCubeToGnomonMapping(k, Sk_prev) {
            let topPairs = []; let rightPairs = [];
            for (let cy = 1; cy < k; cy++) {
                for (let cz = 0; cz < k; cz++) {
                    if (cz < k - cy) topPairs.push({cy, cz});
                    else rightPairs.push({cy, cz});
                }
            }
            let mappings = [];
            for (let cx = 0; cx < k; cx++) {
                for (let cz = 0; cz < k; cz++) {
                    mappings.push({ cx, cy: 0, cz, tx: Sk_prev + cx, tz: Sk_prev + cz });
                }
            }
            for (let i = 0; i < topPairs.length; i++) {
                let p = topPairs[i];
                for (let cx = 0; cx < k; cx++) {
                    mappings.push({ cx, cy: p.cy, cz: p.cz, tx: i, tz: Sk_prev + cx });
                }
            }
            for (let i = 0; i < rightPairs.length; i++) {
                let p = rightPairs[i];
                for (let cx = 0; cx < k; cx++) {
                    mappings.push({ cx, cy: p.cy, cz: p.cz, tx: Sk_prev + cx, tz: i });
                }
            }
            return mappings;
        }

        function createModel(n) {
            groups.forEach(g => masterGroup.remove(g));
            groups = [];
            currentStep = 0;
            clearAutoAnim();
            updateControlsUI();
            
            if (guideBoxMesh) scene.remove(guideBoxMesh);
            if (guideEdgesHelper) scene.remove(guideEdgesHelper);

            showFormulaLabel = false;
            if (formulaTimeout) clearTimeout(formulaTimeout);
            const formulaEl = document.getElementById('label-formula');
            if (formulaEl) {
                formulaEl.style.opacity = '0';
                formulaEl.style.transform = 'translate(-50%, -50%) scale(0.95)';
            }

            const labelsContainer = document.getElementById('labels-container');
            const oldCubeLabels = document.querySelectorAll('.cube-label');
            oldCubeLabels.forEach(el => el.remove());

            const Sn = (n * (n + 1)) / 2;
            let totalBlocks = 0;

            cx_offset.set((Sn - 1) / 2, 0, (Sn - 1) / 2);

            for (let k = 1; k <= n; k++) {
                const group = new THREE.Group();
                const material = materials[k - 1];
                const Sk_prev = (k - 1) * k / 2;
                
                const mappings = buildCubeToGnomonMapping(k, Sk_prev);
                
                const spacing = Math.max(8, n * 2);
                const cubeStartX = (k - (n + 1) / 2) * spacing;
                const cubeStartZ = -Sn/2 - 12;
                const cubeCenterWorld = new THREE.Vector3(cubeStartX, k/2, cubeStartZ);

                const L_TargetCenter = new THREE.Vector3( 
                    ((Sk_prev + k/2) - 0.5) - cx_offset.x, 
                    0, 
                    ((Sk_prev + k/2) - 0.5) - cx_offset.z 
                );

                group.userData = { 
                    animProgress: 0, 
                    animTarget: 0, 
                    localIndex: k,
                    cubeCenterWorld: cubeCenterWorld.clone() 
                };

                mappings.forEach(map => {
                    const mesh = new THREE.Mesh(blockGeo, material);
                    
                    const localCube = new THREE.Vector3(map.cx - (k - 1) / 2, map.cy - (k - 1) / 2, map.cz - (k - 1) / 2);
                    const worldCube = cubeCenterWorld.clone().add(localCube);
                    const worldTarget = new THREE.Vector3(map.tx - cx_offset.x, 0, map.tz - cx_offset.z);
                    const offsetToL = worldTarget.clone().sub(L_TargetCenter);
                    const worldL = cubeCenterWorld.clone().add(offsetToL);

                    mesh.position.copy(worldCube); 
                    mesh.castShadow = true; mesh.receiveShadow = true;
                    
                    mesh.userData = { worldCube, worldL, worldTarget, cy: map.cy };
                    group.add(mesh);
                    totalBlocks++;
                });

                masterGroup.add(group);
                groups.push(group);

                const cubeLabel = document.createElement('div');
                cubeLabel.id = `cube-label-${k}`;
                cubeLabel.className = 'dim-label cube-label opacity-0';
                cubeLabel.textContent = `${k}³`;
                labelsContainer.appendChild(cubeLabel);
            }

            const dummyGeo = new THREE.BoxGeometry(1, 0.95, 1);
            guideBoxMesh = new THREE.Mesh(dummyGeo, new THREE.MeshBasicMaterial({ color: 0x4299e1, transparent: true, opacity: 0, depthWrite: false }));
            guideEdgesHelper = new THREE.LineSegments(new THREE.EdgesGeometry(dummyGeo), new THREE.LineBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0, linewidth: 2 }));
            scene.add(guideBoxMesh);
            scene.add(guideEdgesHelper);

            updateUIInfo(n, totalBlocks);
        }

        function getFormulaString(k) {
            if (k === 1) return "S₁ = 1";
            if (k === 2) return "S₂ = 1 + 2";
            let str = "S" + getSubscript(k) + " = 1 + 2 + ⋯";
            return str + " + " + k;
        }
        
        function getSubscript(num) {
            const subs = ["₀","₁","₂","₃","₄","₅","₆"];
            return subs[num] || num;
        }

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function animate() {
            requestAnimationFrame(animate);

            groups.forEach((group, idx) => {
                let { animProgress, animTarget, localIndex, cubeCenterWorld } = group.userData;
                // 1번 블록(idx === 0)은 더 빠르게 (0.045), 나머지는 기본 속도 (0.015)
                const stepSize = (idx === 0) ? 0.045 : 0.015;

                if (animProgress !== animTarget) {
                    if (animProgress < animTarget) animProgress = Math.min(animProgress + stepSize, animTarget);
                    else animProgress = Math.max(animProgress - stepSize, animTarget);
                    group.userData.animProgress = animProgress;

                    group.children.forEach(mesh => {
                        const { worldCube, worldL, worldTarget, cy } = mesh.userData;
                        if (animProgress <= 1.0) {
                            const t = easeInOutCubic(animProgress);
                            mesh.position.lerpVectors(worldCube, worldL, t);
                            mesh.position.y += Math.sin(t * Math.PI) * 0.5 * (cy + 1);
                        } else {
                            const t = easeInOutCubic(animProgress - 1.0);
                            mesh.position.lerpVectors(worldL, worldTarget, t);
                            const distance = worldL.distanceTo(worldTarget);
                            mesh.position.y += Math.sin(t * Math.PI) * (distance * 0.15 + localIndex * 0.5);
                        }
                    });
                }

                const k = idx + 1;
                const el = document.getElementById(`cube-label-${k}`);
                if (el) {
                    if (animProgress < 0.25) {
                        el.style.opacity = (1 - (animProgress / 0.25)) * 0.85;
                        const labelWorldPos = cubeCenterWorld.clone().add(new THREE.Vector3(0, k/2 + 0.8, 0));
                        updateLabelPos(`cube-label-${k}`, labelWorldPos);
                    } else {
                        el.style.opacity = '0';
                    }
                }
            });

            let activeK = 0;
            for (let i = 0; i < currentN; i++) {
                if (groups[i].userData.animProgress > 1.0) {
                    activeK = i + 1; 
                }
            }

            if (activeK > 0) {
                const Sk = (activeK * (activeK + 1)) / 2;
                
                guideBoxMesh.scale.set(Sk, 1, Sk);
                guideEdgesHelper.scale.set(Sk, 1, Sk);
                
                const guideX = (Sk - 1) / 2 - cx_offset.x;
                const guideZ = (Sk - 1) / 2 - cx_offset.z;
                guideBoxMesh.position.set(guideX, 0, guideZ);
                guideEdgesHelper.position.set(guideX, 0, guideZ);

                guideBoxMesh.material.opacity += (0.1 - guideBoxMesh.material.opacity) * 0.1;
                guideEdgesHelper.material.opacity += (0.6 - guideEdgesHelper.material.opacity) * 0.1;

                document.getElementById('label-w').style.opacity = '0.9';
                document.getElementById('label-d').style.opacity = '0.9';
                
                const labelFormula = getFormulaString(activeK);
                document.getElementById('label-w').textContent = labelFormula;
                document.getElementById('label-d').textContent = labelFormula;

                // 정사각형을 가리지 않도록 다른 꼭짓점 두 개로 라벨 위치 변경
                updateLabelPos('label-w', new THREE.Vector3(guideX - Sk/2, 0, guideZ + Sk/2));
                updateLabelPos('label-d', new THREE.Vector3(guideX + Sk/2, 0, guideZ - Sk/2));

                if (showFormulaLabel) {
                    // 팝업되는 공식을 정사각형 중앙에서 카메라 쪽 앞(화면상 하단)으로 이동
                    updateLabelPos('label-formula', new THREE.Vector3(guideX, 0.5, guideZ + Sk/2 + 3));
                }
            } else {
                guideBoxMesh.material.opacity += (0 - guideBoxMesh.material.opacity) * 0.1;
                guideEdgesHelper.material.opacity += (0 - guideEdgesHelper.material.opacity) * 0.1;
                document.getElementById('label-w').style.opacity = '0';
                document.getElementById('label-d').style.opacity = '0';

                if (showFormulaLabel) {
                    updateLabelPos('label-formula', new THREE.Vector3(0, 1.8, 0));
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function updateLabelPos(id, worldPos) {
            const vec = worldPos.clone().project(camera);
            const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
            const y = (vec.y * -0.5 + 0.5) * window.innerHeight;
            const el = document.getElementById(id);
            if (el) {
                el.style.left = `${x}px`; el.style.top = `${y}px`;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function clearAutoAnim() {
            if (autoAnimTimer) { clearTimeout(autoAnimTimer); autoAnimTimer = null; }
        }

        function triggerFormulaLabel() {
            showFormulaLabel = true;
            const formulaEl = document.getElementById('label-formula');
            if (formulaEl) {
                formulaEl.style.opacity = '0.95';
                formulaEl.style.transform = 'translate(-50%, -50%) scale(1.05)';
            }
            
            if (formulaTimeout) clearTimeout(formulaTimeout);
            formulaTimeout = setTimeout(() => {
                showFormulaLabel = false;
                if (formulaEl) {
                    formulaEl.style.opacity = '0';
                    formulaEl.style.transform = 'translate(-50%, -50%) scale(0.95)';
                }
            }, 6000); 
        }

        function checkIntersectAndTrigger(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            if (guideBoxMesh) {
                const intersects = raycaster.intersectObject(guideBoxMesh);
                if (intersects.length > 0 && currentStep > 0) {
                    triggerFormulaLabel();
                }
            }
        }

        function onDocumentClick(e) {
            if (isDragging) return; 
            if (e.target.closest('.ui-panel')) return;
            checkIntersectAndTrigger(e.clientX, e.clientY);
        }

        function onDocumentTouchStart(e) {
            if (e.target.closest('.ui-panel')) return;
            isDragging = false; 
            if (e.touches.length > 0) {
                setTimeout(() => {
                    if (!isDragging) {
                        checkIntersectAndTrigger(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }, 80);
            }
        }

        function updateControlsUI() {
            const btnAssemble = document.getElementById('btn-step-assemble');
            const btnDisassemble = document.getElementById('btn-step-disassemble');

            if (currentStep < currentN) {
                btnAssemble.textContent = `${currentStep + 1}³ 조립하기`;
                btnAssemble.disabled = false;
            } else {
                btnAssemble.textContent = `조립 완료`;
                btnAssemble.disabled = true;
            }

            if (currentStep > 0) {
                btnDisassemble.textContent = `${currentStep}³ 분해하기`;
                btnDisassemble.disabled = false;
                document.getElementById('val-gnomon').textContent = Math.pow(currentStep, 3);
            } else {
                btnDisassemble.textContent = `분해 완료`;
                btnDisassemble.disabled = true;
                document.getElementById('val-gnomon').textContent = "0";
            }
        }

        function setupUI() {
            let isUIMinimized = true; 
            
            const panel = document.querySelector('.ui-panel');
            const btnToggleUI = document.getElementById('btn-toggle-ui');
            const uiTitle = document.getElementById('ui-title');
            const miniActions = document.getElementById('mini-actions');
            const uiBody = document.getElementById('ui-body');
            const iconCollapse = document.getElementById('icon-collapse');
            const iconExpand = document.getElementById('icon-expand');

            // 토글 이벤트
            btnToggleUI.addEventListener('click', () => {
                isUIMinimized = !isUIMinimized;
                if (isUIMinimized) {
                    panel.classList.add('is-minimized');
                    uiBody.classList.add('hidden');
                    uiTitle.classList.add('hidden');
                    miniActions.classList.remove('hidden');
                    iconCollapse.classList.add('hidden');
                    iconExpand.classList.remove('hidden');
                } else {
                    panel.classList.remove('is-minimized');
                    uiBody.classList.remove('hidden');
                    uiTitle.classList.remove('hidden');
                    miniActions.classList.add('hidden');
                    iconCollapse.classList.remove('hidden');
                    iconExpand.classList.add('hidden');
                }
            });

            // 숫자 조절 버튼
            document.getElementById('btn-n-inc').addEventListener('click', () => {
                if (currentN < 6) { currentN++; document.getElementById('n-display').textContent = currentN; createModel(currentN); }
            });

            document.getElementById('btn-n-dec').addEventListener('click', () => {
                if (currentN > 1) { currentN--; document.getElementById('n-display').textContent = currentN; createModel(currentN); }
            });

            // 개별 조립/분해 버튼 동작 함수
            function stepAssemble() {
                clearAutoAnim();
                if (currentStep < currentN) { 
                    groups[currentStep].userData.animTarget = 2; 
                    currentStep++; 
                    updateControlsUI(); 
                    // 개별 조립 시 마지막 큐브 조립이면 애니메이션 종료 즈음에 팝업 표시
                    if (currentStep === currentN) {
                        setTimeout(() => triggerFormulaLabel(), 2200);
                    }
                }
            }

            function stepDisassemble() {
                clearAutoAnim();
                if (currentStep > 0) { currentStep--; groups[currentStep].userData.animTarget = 0; updateControlsUI(); }
            }

            // 개별 조립/분해 이벤트 바인딩
            document.getElementById('btn-step-assemble').addEventListener('click', stepAssemble);
            document.getElementById('btn-step-disassemble').addEventListener('click', stepDisassemble);

            // 모두 조립/분해 공통 함수
            function assembleNext() {
                if (currentStep < currentN) { 
                    groups[currentStep].userData.animTarget = 2; 
                    let isFirstBlock = (currentStep === 0);
                    currentStep++; 
                    updateControlsUI(); 
                    autoAnimTimer = setTimeout(assembleNext, isFirstBlock ? 600 : 1500);
                } else { 
                    clearAutoAnim(); 
                    // 전체 조립 명령 시 완료 시점에 팝업 띄우기 (마지막 블록 애니메이션 종료 시점 고려)
                    setTimeout(() => {
                        if(currentStep === currentN) triggerFormulaLabel();
                    }, 500);
                }
            }

            function assembleAll() {
                clearAutoAnim();
                assembleNext();
            }

            function disassembleNext() {
                if (currentStep > 0) { 
                    currentStep--; 
                    groups[currentStep].userData.animTarget = 0; 
                    let isFirstBlock = (currentStep === 0);
                    updateControlsUI(); 
                    autoAnimTimer = setTimeout(disassembleNext, isFirstBlock ? 600 : 1500);
                } else { 
                    clearAutoAnim(); 
                }
            }

            function disassembleAll() {
                clearAutoAnim();
                disassembleNext();
            }

            // 전체 및 미니 버튼 바인딩
            document.getElementById('btn-all-assemble').addEventListener('click', assembleAll);
            document.getElementById('btn-mini-assemble').addEventListener('click', assembleAll);
            document.getElementById('btn-all-disassemble').addEventListener('click', disassembleAll);
            document.getElementById('btn-mini-disassemble').addEventListener('click', disassembleAll);
        }

        function updateUIInfo(n, totalBlocks) {
            const Sn = (n * (n + 1)) / 2;
            document.getElementById('val-total').textContent = totalBlocks;
            document.getElementById('val-side').textContent = `1 + 2 + ⋯ + ${n} (= ${Sn})`;
            document.getElementById('val-area').textContent = Sn * Sn;
        }
    </script>
</body>
</html>
