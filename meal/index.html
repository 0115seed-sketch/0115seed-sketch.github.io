<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘의 중식</title>
</head>
<body>
    <pre id="meal-content">중식 정보를 불러오는 중입니다...</pre>

    <script>
        async function fetchMeal() {
            // 1. 발급받은 API 키를 아래 변수에 입력합니다.
            const API_KEY = "2af6977132b24eba82c8f17c111a605c"; 
            
            const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
            
            // 2. URL에 API 키(&KEY=)와 중식 식사코드(&MMEAL_SC_CODE=2)를 추가했습니다.
            const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=N10&SD_SCHUL_CODE=8140253&MLSV_YMD=${today}&MMEAL_SC_CODE=2`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // 데이터가 정상적으로 존재하는지 확인 (mealServiceDietInfo 속성 존재 여부)
                if (data.mealServiceDietInfo) {
                    let mealInfo = data.mealServiceDietInfo[1].row[0].DDISH_NM;
                    
                    // <br/> 태그를 일반 줄바꿈으로 정제
                    let cleanedMeal = mealInfo.split('<br/>').join('\n');
                    document.getElementById('meal-content').textContent = `--- 오늘의 중식"{today}" ---\n\n${cleanedMeal}`;
                } else {
                    // 주말이거나 중식 정보가 없는 경우의 예외 처리
                    document.getElementById('meal-content').textContent = "오늘의 중식 정보가 없습니다.";
                }
            } catch (error) {
                document.getElementById('meal-content').textContent = "데이터를 불러오는 중 네트워크 오류가 발생했습니다.";
            }
        }
        
        fetchMeal();
    </script>
</body>
</html>
